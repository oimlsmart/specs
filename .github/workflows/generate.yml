name: generate

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Stage 1 — Metanorma proper (released stack): compile AsciiDoc to
  # presentation XML and render outputs (xml, pdf, rxl), assemble _site.
  compile:
    runs-on: ubuntu-latest
    container:
      image: metanorma/metanorma:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Metanorma assets
        uses: actions-mn/cache@v1

      - name: Install private Fontist fonts (Futura PT)
        env:
          GH_TOKEN: ${{ secrets.METANORMA_CI_PAT_TOKEN }}
        run: |
          # Refresh the default public formulas repo first (cleartype/Cambria
          # lives there); the container's pre-built index does not include it
          fontist update
          # Register the private repo under its own name so the default
          # public formulas repo stays available
          fontist repo setup private "https://${GH_TOKEN}@github.com/metanorma/fontist-formulas-private"
          fontist repo update private
          fontist install "Futura PT Book" --accept-all-licenses --no-progress
          fontist install "Futura PT Demi" --accept-all-licenses --no-progress
          fontist install "Futura PT Light" --accept-all-licenses --no-progress
          fontist install "Cambria" --accept-all-licenses --no-progress
          fontist install "Cambria Math" --accept-all-licenses --no-progress

      - name: Metanorma generate site
        run: metanorma site generate --agree-to-terms --continue-without-fonts

      - name: Upload compiled site
        uses: actions/upload-artifact@v4
        with:
          name: mn-site
          path: _site
          if-no-files-found: error

  # Stage 2 — Renderer toolchain (pubid 2.0 / relaton prerelease line):
  # metanorma-document HTML, OIML STS XML/HTML, themed index, Pages artifact.
  # Runs on a vanilla Ruby setup, NOT the metanorma container: the image's
  # baked-in bundler config interferes with installing a second bundle.
  render:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vendor metanorma-oiml (unreleased, path source)
        run: git clone --depth 1 https://github.com/metanorma/metanorma-oiml vendor/metanorma-oiml

      - name: Set up Ruby with the renderer bundle
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
        env:
          BUNDLE_GEMFILE: Gemfile.renderer

      - name: Download compiled site
        uses: actions/download-artifact@v4
        with:
          name: mn-site
          path: _site

      - name: Generate site HTML (metanorma-document) and OIML STS outputs
        env:
          BUNDLE_GEMFILE: Gemfile.renderer
        run: |
          doc=_site/documents/sts-guidelines
          bundle exec ruby -e \
            'require "metanorma/document"; require "metanorma/oiml/document"; doc = Metanorma::Oiml::Document::Root.from_xml(File.read(ARGV[0])); File.write(ARGV[1], Metanorma::Html::Generator.generate(doc))' \
            "$doc/document.presentation.xml" "$doc/document.html"
          bundle exec oiml-sts convert \
            "$doc/document.presentation.xml" "$doc/document.sts.xml"
          bundle exec ruby -r metanorma/oiml/sts -e \
            'File.write(ARGV[1], Metanorma::Oiml::Sts::HtmlRenderer.render(File.read(ARGV[0])))' \
            "$doc/document.sts.xml" "$doc/document.sts.html"
          ls -la "$doc/"

      - name: Install themed site index
        run: cp site/index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: render
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
