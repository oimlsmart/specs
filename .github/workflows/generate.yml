name: generate

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: metanorma/metanorma:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Metanorma assets
        uses: actions-mn/cache@v1

      - name: Install private Fontist fonts (Futura PT)
        env:
          GH_TOKEN: ${{ secrets.METANORMA_CI_PAT_TOKEN }}
        run: |
          fontist repo setup metanorma "https://${GH_TOKEN}@github.com/metanorma/fontist-formulas-private"
          fontist repo update metanorma
          fontist install "Futura PT Book"
          fontist install "Futura PT Demi"
          fontist install "Futura PT Light"
          # Optional: math/body fallback fonts if the private repo carries them
          fontist install "Cambria" || echo "::notice::Cambria not available, PDF will fall back"
          fontist install "Cambria Math" || echo "::notice::Cambria Math not available, PDF will fall back"

      - name: Metanorma generate site
        run: metanorma site generate --agree-to-terms --continue-without-fonts

      - name: Install metanorma-oiml STS toolchain
        run: |
          git clone --depth 1 https://github.com/metanorma/metanorma-oiml /tmp/metanorma-oiml
          cd /tmp/metanorma-oiml
          gem build metanorma-oiml.gemspec
          gem install --local metanorma-oiml-*.gem

      - name: Generate OIML STS outputs alongside document.html
        run: |
          doc=_site/documents/sts-guidelines
          oiml-sts convert "$doc/document.presentation.xml" "$doc/document.sts.xml"
          ruby -r metanorma/oiml/sts -e \
            'File.write(ARGV[1], Metanorma::Oiml::Sts::HtmlRenderer.render(File.read(ARGV[0]), renderer: :xslt))' \
            "$doc/document.sts.xml" "$doc/document.sts.html"
          cp "$(gem contents metanorma-oiml | grep 'vendor/xslt/oiml-logo.svg')" "$doc/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
