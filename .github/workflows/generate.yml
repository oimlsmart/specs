name: generate

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: metanorma/metanorma:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Metanorma assets
        uses: actions-mn/cache@v1

      - name: Install private Fontist fonts (Futura PT)
        env:
          GH_TOKEN: ${{ secrets.METANORMA_CI_PAT_TOKEN }}
        run: |
          # Refresh the default public formulas repo first (cleartype/Cambria
          # lives there); the container's pre-built index does not include it
          fontist update
          # Register the private repo under its own name so the default
          # public formulas repo stays available
          fontist repo setup private "https://${GH_TOKEN}@github.com/metanorma/fontist-formulas-private"
          fontist repo update private
          fontist install "Futura PT Book" --accept-all-licenses --no-progress
          fontist install "Futura PT Demi" --accept-all-licenses --no-progress
          fontist install "Futura PT Light" --accept-all-licenses --no-progress
          fontist install "Cambria" --accept-all-licenses --no-progress
          fontist install "Cambria Math" --accept-all-licenses --no-progress

      - name: Metanorma generate site
        run: metanorma site generate --agree-to-terms --continue-without-fonts

      - name: Install metanorma-document and metanorma-oiml toolchains
        run: |
          # Renderer toolchain runs on the pubid 2.0 / relaton prerelease line;
          # install these first so later gem installs keep them
          gem install pubid --pre
          gem install relaton-bib --pre
          # metanorma-document >= 0.2.11 renders the body; mml is required at
          # load time but only declared transitively (via sts/plurimath)
          gem install metanorma-document mml
          git clone --depth 1 https://github.com/metanorma/metanorma-oiml /tmp/metanorma-oiml
          (cd /tmp/metanorma-oiml && gem build metanorma-oiml.gemspec && gem install metanorma-oiml-*.gem)

      - name: Generate site HTML (metanorma-document) and OIML STS outputs
        run: |
          doc=_site/documents/sts-guidelines
          # bypass the image's bundler shim; gems were installed system-wide
          env -u BUNDLE_GEMFILE -u RUBYOPT ruby -e \
            'gem "metanorma-document"; require "metanorma/document"; doc = Metanorma::OimlDocument::Root.from_xml(File.read(ARGV[0])); File.write(ARGV[1], Metanorma::Html::Generator.generate(doc))' \
            "$doc/document.presentation.xml" "$doc/document.html"
          env -u BUNDLE_GEMFILE -u RUBYOPT oiml-sts convert \
            "$doc/document.presentation.xml" "$doc/document.sts.xml"
          env -u BUNDLE_GEMFILE -u RUBYOPT ruby -r metanorma/oiml/sts -e \
            'File.write(ARGV[1], Metanorma::Oiml::Sts::HtmlRenderer.render(File.read(ARGV[0]), renderer: :xslt))' \
            "$doc/document.sts.xml" "$doc/document.sts.html"
          GEMDIR=$(env -u BUNDLE_GEMFILE -u RUBYOPT ruby -e \
            'puts Gem::Specification.find_by_name("metanorma-oiml").gem_dir')
          cp "$GEMDIR/vendor/xslt/oiml-logo.svg" "$doc/"
          ls -la "$doc/"

      - name: Install themed site index
        run: cp site/index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
